name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Let the workflow publish to GitHub Pages. One-time repo setup:
# Settings -> Pages -> Source = "GitHub Actions".
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked --group docs
      # Regenerate the coverage badge into the docs tree so it ships in the Pages
      # site at /assets/coverage.svg (the URL the README badge points at). No
      # commit-back, no third-party service — the SVG is rebuilt on every deploy.
      - name: coverage badge
        run: |
          uv run pytest -m "not rxinfer" --cov=cpomdp --cov-report=xml -q
          uvx --from "genbadge[coverage]" genbadge coverage \
            -i coverage.xml -o docs/assets/coverage.svg
      - run: uv run mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
