# One-time setup after cloning (installs both the pre-commit and commit-msg hooks):
#   uv run pre-commit install --hook-type pre-commit --hook-type commit-msg
# The ruff and ty hooks mirror the CI `lint` job, so a clean commit here is a green CI.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep this in sync with the `ruff` pin in pyproject's dev group, so local
    # and CI agree on exactly which ruff is judging the code.
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Strict type-checking, mirroring the CI `ty (strict types)` step exactly.
  # A local hook running the same `uv run ty check` keeps local and CI in lockstep
  # (the pinned ty version lives in pyproject's dev group, like ruff above).
  - repo: local
    hooks:
      - id: ty
        name: ty (strict types)
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  # Markdown linting. Rules and ignores live in `.markdownlint-cli2.yaml` so a
  # local run (`markdownlint-cli2`) and this hook judge the docs identically.
  # pre-commit provisions its own Node, so no global install is needed.
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        # The mkdocs single-source stubs aren't standalone documents (they're
        # `--8<--` includes of README.md / CHANGELOG.md), so skip them.
        exclude: ^docs/(index|changelog)\.md$

  # Spell-check prose and docstrings. The dictionary and ignores live in
  # `cspell.json`, so the editor extension and these hooks agree. pre-commit
  # provisions its own Node. Two runs: markdown everywhere, plus the `src/`
  # Python (cspell splits snake_case into real words, so it mostly catches
  # docstring/comment typos — code identifiers are allow-listed in cspell.json).
  - repo: https://github.com/streetsidesoftware/cspell-cli
    rev: v10.0.1
    hooks:
      - id: cspell
        name: cspell (markdown)
        types: [markdown]
        # The mkdocs single-source stubs are `--8<--` includes, not documents.
        exclude: ^docs/(index|changelog)\.md$
      - id: cspell
        name: cspell (src docstrings)
        types: [python]
        files: ^src/

  # Enforce Conventional Commit messages (feat:, fix:, docs:, ...), matching the
  # style already used in the git history. Runs at the commit-msg stage.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
